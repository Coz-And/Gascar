<html lang="it">
<head>
  <title>Registrati – GASCAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../CSS/Login&Registrati.css">
  <script src="https://kit.fontawesome.com/a2d9c1e5b0.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
  <!-- Left illustration (same as login) -->
  <div class="hero">
    <div class="hero-overlay"></div>
  </div>

  <!-- Right form -->
  <div class="form-card">
    <img src="logo.png" alt="GASCAR Logo" class="logo">

    <h2>Crea il tuo account</h2>

    <form action="/register" method="POST">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <p>Inserisci il nome e Cognome</p>
        <input type="text" name="fullname" placeholder="Nome e Cognome" required>
      </div>

      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <p>Inserisci l'email</p>
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <p>Inserisci la password</p>
        <input type="password" name="password" placeholder="Password" required minlength="8">
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <p>Coonferma la password</p>
        <input type="password" name="confirm_password" placeholder="Conferma password" required minlength="8">
      </div>

      <button type="submit" class="btn-primary">Registrati</button>
    </form>

    <div class="footer-links">
      Hai già un account? <a href="../Page/login.html">Accedi</a>
    </div>
  </div>
</div>

</body>
</html>
