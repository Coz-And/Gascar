<html>
<head>
    <meta charset="UTF-8">
    <title>Scheda Colonnina – Prenota ricarica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/general.css">
</head>

<body>
<div class="wrapper">

    <header class="header">
        <h1>Colonnina di ricarica – <span class="station-id">#42</span></h1>
    </header>

    <section class="station-details">
        <img src="placeholder-station.jpg" alt="Foto della colonnina" class="station-photo">
        <ul class="details-list">
            <li><strong>Indirizzo:</strong> Via Roma 12, Milano</li>
            <li><strong>Tipo di presa:</strong> CCS, Tipo 2</li>
            <li><strong>Potenza:</strong> 22 kW (AC) – 50 kW (DC)</li>
            <li><strong>Disponibilità:</strong> <span class="available">Libera</span></li>
        </ul>
    </section>

    <section class="reservation">
        <h2>Prenota uno slot</h2>

        <form id="reserve-form" action="booking-data.html" method="GET">
            <label for="date">Data *</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Orario di inizio *</label>
            <input type="time" id="time" name="time" required>

            <label for="duration">Durata prevista (minuti) *</label>
            <input type="number" id="duration" name="duration"
                   min="15" max="240" step="15" placeholder="60" required>

            <button type="submit" class="btn-primary">Prenota</button>
        </form>
    </section>

</div>
</body>
</html>
