<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Conferma prenotazione – Dati di fatturazione</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/general.css">
</head>

<body>
<div class="wrapper">

    <header class="header">
        <h1>Conferma prenotazione</h1>
    </header>

    <section class="summary">
        <h2>Dettagli prenotazione</h2>
        <p id="booking-summary">Caricamento…</p>
    </section>

    <section class="billing">
        <h2>Dati di fatturazione</h2>

        <form id="billing-form" action="/process-future-payment" method="POST">
            <!-- Nome / Cognome -->
            <label for="firstName">Nome *</label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="lastName">Cognome *</label>
            <input type="text" id="lastName" name="lastName" required>

            <!-- Email -->
            <label for="email">Email *</label>
            <input type="email" id="email" name="email"
                   placeholder="tuo@email.it" required>

            <!-- Partita IVA (opzionale) -->
            <label for="vat">Partita IVA (se aziendale)</label>
            <input type="text" id="vat" name="vat"
                   pattern="[0-9]{11}"
                   title="Inserisci 11 cifre numeriche">

            <!-- Indirizzo -->
            <label for="address">Indirizzo *</label>
            <input type="text" id="address" name="address"
                   placeholder="Via Napoli 45, Torino" required>

            <!-- Metodo di pagamento futuro -->
            <label for="payMethod">Metodo di pagamento (future charge) *</label>
            <select id="payMethod" name="payMethod" required>
                <option value="" disabled selected>-- scegli --</option>
                <option value="card">Carta di credito / debito</option>
                <option value="paypal">PayPal</option>
                <option value="bank">Bonifico bancario (fattura)</option>
            </select>

            <!-- Consenso -->
            <div class="consent">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">
                    Accetto <a href="/privacy" target="_blank">l’informativa sulla privacy</a> e i <a href="/terms" target="_blank">termini di servizio</a>.
                </label>
            </div>

            <button type="submit" class="btn-primary">Conferma e paga più tardi</button>
        </form>
    </section>

</div>

<script>
/* --------------------------------------------------------------
   Visualizza nella sezione “Dettagli prenotazione” i valori
   ricevuti dalla pagina precedente (query‑string).
   -------------------------------------------------------------- */
function getQuery() {
    const params = new URLSearchParams(window.location.search);
    const date = params.get('date') || '–';
    const time = params.get('time') || '–';
    const duration = params.get('duration') || '–';
    return {date, time, duration};
}

document.addEventListener('DOMContentLoaded', () => {
    const {date, time, duration} = getQuery();
    const summary = `
        <strong>Data:</strong> ${date}<br>
        <strong>Ora di inizio:</strong> ${time}<br>
        <strong>Durata prevista:</strong> ${duration} min`;
    document.getElementById('booking-summary').innerHTML = summary;
});
</script>
</body>
</html>
