<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="../CSS/passworddimenticata.css">
</head>
<body>
<div class="container">
  <h2>Reset Password</h2>

  <form method="POST" action="/reset-password">
    <input type="hidden" name="token" value="{{TOKEN}}">

    <input type="password" name="password" placeholder="Nuova password" required>
    <input type="password" name="password_confirm" placeholder="Conferma password" required>

    <button type="submit">Reimposta password</button>
  </form>
</div>

</body>
</html>
