<html >
<head>
    <meta charset="UTF-8">
    <title>Pagamento – Colonnine Elettriche</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Stili (vedi sezione CSS più sotto) -->
    <link rel="stylesheet" href="../CSS/registrazioni_dati.css">
    </head>

    <body>
    <div class="payment-wrapper">
        <h1>Registra il tuo metodo di pagamento</h1>

        <form id="payment-form" action="/process-payment" method="POST">

            <!-- ==================== Dati di fatturazione ==================== -->
            <fieldset>
                <legend>Dati di fatturazione</legend>

                <label for="nome">Nome *</label>
                <input type="text" id="nome" name="nome" placeholder="Mario" required>

                <label for="cognome">Cognome *</label>
                <input type="text" id="cognome" name="cognome" placeholder="Rossi" required>

                <label for="email">Email *</label>
                <input type="text" id="email" name="email" placeholder="Rossi@gmail.com" required>

                <label for="password">Password *</label>
                <input type="text" id="password" name="password" placeholder="$1235342" required>

                <label for="password">Conferma Password *</label>
                <input type="text" id="password" name="password" placeholder="$1235342" required>

                <label for="azienda">Azienda / Ragione sociale (opz.)</label>
                <input type="text" id="azienda" name="azienda" placeholder="Acme S.p.A.">

                <label for="piva">Partita IVA (opz.)</label>
                <input type="text" id="piva" name="piva"
                    pattern="[0-9]{11}"
                    title="Inserisci 11 cifre numeriche"
                    placeholder="12345678901">
            </fieldset>


            <!-- ==================== Consenso ==================== -->
            <div class="consent">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">
                    Accetto <a href="/privacy" target="_blank">l’informativa sulla privacy</a> e i <a href="/terms" target="_blank">termini di servizio</a>.
                </label>
            </div>

            <button type="submit" class="btn-primary">Inserimento dati</button>
        </form>
    </div>
    </body>
    </html>
